function ChatbotTab({ t, lang }) {
  const [messages, setMessages] = useState([
    { id: 1, role: 'assistant', content: t.assistant.initialGreeting, cves: [] }
  ]);
  const [inputValue, setInputValue] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSend = async (text) => {
    const query = text || inputValue;
    if (!query.trim() || loading) return;

    // 1. Ajouter le message utilisateur
    const userMsg = { id: Date.now(), role: 'user', content: query };
    setMessages(prev => [...prev, userMsg]);
    if (!text) setInputValue('');
    setLoading(true);

    try {
      // 2. Appel direct à l'API Backend Python (FastAPI)
      const res = await fetch('http://localhost:8000/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: query, lang: lang })
      });
      
      const data = await res.json();

      // 3. Ajouter la réponse naturelle générée par Gemini
      const botMsg = { 
        id: Date.now() + 1, 
        role: 'assistant', 
        content: data.response, 
        cves: data.cves || [] 
      };
      setMessages(prev => [...prev, botMsg]);
    } catch (err) {
      setMessages(prev => [...prev, { 
        id: Date.now() + 1, 
        role: 'assistant', 
        content: "⚠️ Erreur de connexion avec le serveur Python (FastAPI). Assurez-vous que le backend est lancé sur http://localhost:8000." 
      }]);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="glass-panel rounded-2xl border border-slate-800 flex flex-col h-[600px] overflow-hidden">
      <div className="px-6 py-4 bg-slate-900/90 border-b border-slate-800 flex items-center justify-between">
        <h3 className="font-bold text-white">{t.assistant.title}</h3>
        <span className="text-xs text-emerald-400 font-bold bg-emerald-500/10 px-2.5 py-1 rounded-full border border-emerald-500/30">
          Gemini Live API
        </span>
      </div>

      <div className="flex-1 p-6 overflow-y-auto space-y-4">
        {messages.map(m => (
          <div key={m.id} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
            <div className={`max-w-xl p-4 rounded-2xl text-sm whitespace-pre-line ${m.role === 'user' ? 'bg-cyan-600 text-white' : 'bg-slate-900 border border-slate-800 text-slate-200'}`}>
              {m.content}
              {m.cves && m.cves.length > 0 && (
                <div className="mt-2 text-xs text-cyan-400 font-mono">Sources : {m.cves.join(', ')}</div>
              )}
            </div>
          </div>
        ))}
        {loading && (
          <div className="flex justify-start">
            <div className="p-4 rounded-2xl bg-slate-900 border border-slate-800 text-slate-400 text-sm animate-pulse">
              ⚡ TECHPULSE-AI réfléchit...
            </div>
          </div>
        )}
      </div>

      <div className="p-3 bg-slate-950 border-t border-slate-800/80 flex flex-wrap gap-2">
        {t.assistant.promptChips.map((chip, i) => (
          <button key={i} onClick={() => handleSend(chip)} className="px-3 py-1 rounded-xl bg-slate-900 border border-slate-800 text-xs text-slate-300 hover:text-cyan-400 transition">
            {chip}
          </button>
        ))}
      </div>

      <form onSubmit={e => { e.preventDefault(); handleSend(); }} className="p-4 bg-slate-900 border-t border-slate-800 flex space-x-3">
        <input
          type="text"
          value={inputValue}
          onChange={e => setInputValue(e.target.value)}
          placeholder={t.assistant.inputPlaceholder}
          className="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-cyan-500"
        />
        <button type="submit" disabled={loading} className="px-5 py-2.5 rounded-xl bg-cyan-600 text-white font-bold text-sm shadow-md hover:bg-cyan-500 disabled:opacity-50">
          {t.assistant.sendBtn}
        </button>
      </form>
    </div>
  );
}

            <div className="glass-panel p-6 rounded-2xl border border-slate-800">
              <h2 className="text-2xl font-bold text-white">{t.gdsSecurity.title}</h2>
              <p className="text-sm text-slate-400 mt-1">{t.gdsSecurity.subtitle}</p>
            </div>

            <div className="glass-panel rounded-2xl border border-slate-800 overflow-hidden">
              <table className="w-full text-left text-sm text-slate-300">
                <thead className="bg-slate-900 text-xs uppercase tracking-wider text-slate-400">
                  <tr>
                    <th className="py-3.5 px-6">Connecteur</th>
                    <th className="py-3.5 px-6">Type</th>
                    <th className="py-3.5 px-6">Statut</th>
                    <th className="py-3.5 px-6">Latence</th>
                    <th className="py-3.5 px-6">TLS</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-800">
                  {t.gdsSecurity.systems.map((s, i) => (
                    <tr key={i} className="hover:bg-slate-900/50">
                      <td className="py-4 px-6 font-bold text-white">{s.name}</td>
                      <td className="py-4 px-6 text-slate-400">{s.type}</td>
                      <td className="py-4 px-6"><span className="px-2.5 py-1 rounded-full text-xs font-bold bg-emerald-500/10 text-emerald-400 border border-emerald-500/30">{s.status}</span></td>
                      <td className="py-4 px-6 font-mono text-cyan-400 font-semibold">{s.latency}</td>
                      <td className="py-4 px-6 font-mono text-xs text-slate-400">{s.tls}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        );
      }

      function SettingsTab({ t, notify }) {
        return (
          <div className="glass-panel p-6 rounded-2xl border border-slate-800 space-y-4 max-w-2xl">
            <h2 className="text-2xl font-bold text-white">{t.settings.title}</h2>
            <p className="text-sm text-slate-400">{t.settings.subtitle}</p>
            <div className="pt-4 space-y-3">
              <label className="block text-sm font-semibold text-slate-300">{t.settings.llmProviderTitle}</label>
              <select className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-white">
                <option>{t.settings.llmProviders.gemini}</option>
                <option>{t.settings.llmProviders.openai}</option>
                <option>{t.settings.llmProviders.offline}</option>
              </select>
            </div>
            <button onClick={() => notify(t.settings.saveSuccess)} className="mt-4 px-6 py-2.5 rounded-xl bg-cyan-600 text-white font-bold text-sm hover:bg-cyan-500">
              {t.settings.saveBtn}
            </button>
          </div>
        );
      }

      function App() {
        const [lang, setLang] = useState('fr');
        const [activeTab, setActiveTab] = useState('dashboard');
        const [agency, setAgency] = useState('abidjan');
        const [toast, setToast] = useState(null);

        const t = translations[lang];

        const notify = (msg) => {
          setToast(msg);
          setTimeout(() => setToast(null), 3000);
        };

        return (
          <div className="min-h-screen bg-[#0B0F17] text-slate-100 flex flex-col font-sans">
            {toast && (
              <div className="fixed bottom-6 right-6 z-50 px-4 py-3 rounded-xl bg-cyan-950 border border-cyan-500 text-cyan-300 text-xs font-bold shadow-2xl">
                ✓ {toast}
              </div>
            )}

            <Header lang={lang} setLang={setLang} agency={agency} setAgency={setAgency} t={t} />

            <div className="flex-1 flex p-6 gap-6 max-w-7xl mx-auto w-full">
              <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} t={t} />
              <main className="flex-1 min-w-0">
                {activeTab === 'dashboard' && <DashboardTab t={t} notify={notify} />}
                {activeTab === 'assistant' && <ChatbotTab t={t} lang={lang} />}
                {activeTab === 'gdsSecurity' && <GdsSecurityTab t={t} />}
                {activeTab === 'settings' && <SettingsTab t={t} notify={notify} />}
              </main>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
