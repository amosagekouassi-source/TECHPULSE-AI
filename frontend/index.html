      // ── Parseur Markdown léger (pas de dépendance externe) ──
      function renderMarkdown(text) {
        if (!text) return null;
        const lines = text.split('\n');
        const elements = [];
        let i = 0;
        while (i < lines.length) {
          const line = lines[i];
          // Titre H1
          if (line.startsWith('# ')) {
            elements.push(<h1 key={i} className="text-lg font-black text-white mt-3 mb-1">{line.slice(2)}</h1>);
          }
          // Titre H2
          else if (line.startsWith('## ')) {
            elements.push(<h2 key={i} className="text-base font-bold text-cyan-300 mt-3 mb-1 border-b border-slate-700 pb-1">{line.slice(3)}</h2>);
          }
          // Titre H3
          else if (line.startsWith('### ')) {
            elements.push(<h3 key={i} className="text-sm font-bold text-emerald-400 mt-2 mb-0.5">{line.slice(4)}</h3>);
          }
          // Ligne de séparation ---
          else if (/^---+$/.test(line.trim())) {
            elements.push(<hr key={i} className="border-slate-700 my-2" />);
          }
          // Item de liste * ou -
          else if (/^[*\-]\s+/.test(line)) {
            elements.push(
              <div key={i} className="flex items-start space-x-2 my-0.5">
                <span className="text-cyan-400 mt-0.5 shrink-0">▸</span>
                <span dangerouslySetInnerHTML={{ __html: inlineFormat(line.replace(/^[*\-]\s+/, '')) }} />
              </div>
            );
          }
          // Item numéroté 1. 2.
          else if (/^\d+\.\s+/.test(line)) {
            const num = line.match(/^(\d+)\.\s+/)[1];
            elements.push(
              <div key={i} className="flex items-start space-x-2 my-0.5">
                <span className="text-cyan-400 font-bold shrink-0 w-5 text-right">{num}.</span>
                <span dangerouslySetInnerHTML={{ __html: inlineFormat(line.replace(/^\d+\.\s+/, '')) }} />
              </div>
            );
          }
          // Code block ```
          else if (line.startsWith('```')) {
            const codeLines = [];
            i++;
            while (i < lines.length && !lines[i].startsWith('```')) {
              codeLines.push(lines[i]);
              i++;
            }
            elements.push(
              <pre key={i} className="bg-slate-950 border border-slate-700 rounded-lg p-3 my-2 text-xs text-emerald-300 font-mono overflow-x-auto whitespace-pre-wrap">
                {codeLines.join('\n')}
              </pre>
            );
          }
          // Ligne vide
          else if (line.trim() === '') {
            elements.push(<div key={i} className="h-1" />);
          }
          // Paragraphe normal
          else {
            elements.push(<p key={i} className="my-0.5 leading-relaxed" dangerouslySetInnerHTML={{ __html: inlineFormat(line) }} />);
          }
          i++;
        }
        return <div className="space-y-0.5">{elements}</div>;
      }

      function inlineFormat(text) {
        return text
          .replace(/\*\*([^*]+)\*\*/g, '<strong class="text-white font-bold">$1</strong>')
          .replace(/\*([^*]+)\*/g, '<em class="text-slate-300 italic">$1</em>')
          .replace(/`([^`]+)`/g, '<code class="bg-slate-800 text-emerald-300 font-mono px-1 py-0.5 rounded text-xs">$1</code>')
          .replace(/CVE-\d{4}-\d+/g, (m) => `<span class="font-mono font-bold text-rose-400 bg-rose-500/10 px-1 rounded">${m}</span>`)
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" class="text-cyan-400 underline hover:text-cyan-300">$1</a>');
      }

                  🛡️
                </div>
                <h2 className="text-2xl font-black text-white tracking-tight">TECHPULSE-AI</h2>
                <p className="text-xs text-slate-400 font-medium">Authentification Sécurisée — Suite Cyber Voyage</p>
              </div>

              <form onSubmit={handleSubmit} className="space-y-4">
                {error && (
                  <div className="p-3 rounded-xl bg-rose-500/10 border border-rose-500/30 text-rose-400 text-xs font-semibold text-center">
                    {error}
                  </div>
                )}

                <div>
                  <label className="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1.5">Identifiant / Email</label>
                  <input
                    type="text"
                    value={email}
                    onChange={e => setEmail(e.target.value)}
                    required
                    className="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500 transition"
                  />
                </div>

                <div>
                  <label className="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1.5">Mot de passe</label>
                  <input
                    type="password"
                    value={password}
                    onChange={e => setPassword(e.target.value)}
                    required
                    className="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500 transition"
                  />
                </div>

                <div className="p-3 rounded-xl bg-cyan-950/40 border border-cyan-500/20 text-[11px] text-cyan-300 flex items-center justify-between">
                  <span>🔑 Accès Démo Jury :</span>
                  <span className="font-mono font-bold text-white">admin@techpulse.ai / admin</span>
                </div>

                <button
                  type="submit"
                  disabled={loading}
                  className="w-full py-3.5 rounded-xl bg-gradient-to-r from-cyan-500 to-emerald-500 hover:from-cyan-400 hover:to-emerald-400 text-slate-950 font-black text-sm shadow-xl transition transform active:scale-95 disabled:opacity-50"
                >
                  {loading ? 'Connexion en cours...' : 'Se Connecter à la Suite Cyber'}
                </button>
              </form>
            </div>
          </div>
        );
      }

      function App() {
        const [lang, setLang] = useState('fr');
        const [activeTab, setActiveTab] = useState('dashboard');
        const [agency, setAgency] = useState('abidjan');
        const [toast, setToast] = useState(null);
        
        // Authentification state
        const [user, setUser] = useState(() => {
          const saved = localStorage.getItem('techpulse_user');
          return saved ? JSON.parse(saved) : null;
        });

        const [selectedProvider, setSelectedProvider] = useState(() => {
          return localStorage.getItem('techpulse_llm_provider') || 'gemini';
        });

        const t = translations[lang];

        const notify = (msg) => {
          setToast(msg);
          setTimeout(() => setToast(null), 3000);
        };

        const handleLogin = (userData, token) => {
          setUser(userData);
          localStorage.setItem('techpulse_user', JSON.stringify(userData));
          localStorage.setItem('techpulse_token', token);
          notify('Connexion réussie à la suite TECHPULSE-AI');
        };

        const handleLogout = () => {
          setUser(null);
          localStorage.removeItem('techpulse_user');
          localStorage.removeItem('techpulse_token');
        };

        if (!user) {
          return <LoginModal onLogin={handleLogin} lang={lang} />;
        }

        return (
          <div className="min-h-screen bg-[#0B0F17] text-slate-100 flex flex-col font-sans">
            {toast && (
              <div className="fixed bottom-6 right-6 z-50 flex items-center space-x-2 px-4 py-3 rounded-xl bg-cyan-950 border border-cyan-500 text-cyan-300 text-xs font-bold shadow-2xl shadow-cyan-950/40">
                <span className="text-emerald-400">✔</span>
                <span>{toast}</span>
              </div>
            )}

            <Header lang={lang} setLang={setLang} agency={agency} setAgency={setAgency} t={t} user={user} onLogout={handleLogout} />

            <div className="flex-1 flex p-6 gap-6 max-w-7xl mx-auto w-full">
              <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} t={t} />
              <main className="flex-1 min-w-0">
                {activeTab === 'dashboard' && <DashboardTab t={t} notify={notify} agency={agency} />}
                {activeTab === 'assistant' && <ChatbotTab t={t} lang={lang} />}
                {activeTab === 'gdsSecurity' && <GdsSecurityTab t={t} />}
                {activeTab === 'settings' && (
                  <SettingsTab
                    t={t}
                    notify={notify}
                    selectedProvider={selectedProvider}
                    setSelectedProvider={setSelectedProvider}
                  />
                )}
              </main>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
